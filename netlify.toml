# Netlify: фронтенд в подпапке frontend
# В UI Netlify можно оставить поля пустыми — настройки возьмутся отсюда.
# Перед деплоем задайте в Site settings → Environment variables:
#   VITE_API_URL = https://ваш-backend.up.railway.app  (без слэша в конце)

[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

# SPA: все пути отдаём index.html (на будущее, если появится client-side routing)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
